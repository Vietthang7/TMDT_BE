version: "3.8"

services:
  # ────────────────────────────────────────────────────────────
  # PostgreSQL with pgvector
  # ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fitness_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fitness_shop}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # Redis
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fitness_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # AI Recommendation Service (FastAPI + pgvector)
  # ────────────────────────────────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: fitness_ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-fitness_shop}
      API_HOST: 0.0.0.0
      API_PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # Transaction Service (MBBank API)
  # ────────────────────────────────────────────────────────────
  transaction:
    build:
      context: ./transaction
      dockerfile: dockerfile
    container_name: fitness_transaction
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MB_USERNAME: ${MB_USERNAME:-}
      MB_PASSWORD: ${MB_PASSWORD:-}
      MB_ACCOUNT_NO: ${MB_ACCOUNT_NO:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
